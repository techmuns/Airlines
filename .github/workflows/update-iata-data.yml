name: Update IATA data

# Keeps data/data.json up to date with IATA's monthly "Air Passenger Market
# Analysis". Runs on a schedule (IATA publishes ~4 weeks after month-end) and
# can also be run on demand. When data/data.json changes it commits, which
# Cloudflare Pages then redeploys automatically.

on:
  schedule:
    # 06:00 UTC on the 5th, 12th, 19th, 26th — catches the report whenever IATA
    # publishes it that month. Re-runs are idempotent (no-op if unchanged).
    - cron: "0 6 5,12,19,26 * *"
  workflow_dispatch:
    inputs:
      pdf_url:
        description: "Optional: direct URL to an IATA Air Passenger PDF (skips auto-discovery)"
        required: false
        default: ""
      mode:
        description: "run = fetch & update (default); diagnose = just list links IATA exposes"
        required: false
        default: "run"

permissions:
  contents: write

concurrency:
  group: update-iata-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          pip install --quiet "pdfminer.six>=20221105"
          npm install --no-save playwright@1.56.1
          npx playwright install --with-deps chromium

      - name: Diagnose (list IATA links) and stop
        if: ${{ github.event.inputs.mode == 'diagnose' }}
        run: node tools/fetch_iata_pdf.js --diagnose

      - name: Fetch & update IATA data
        if: ${{ github.event.inputs.mode != 'diagnose' }}
        run: |
          set -o pipefail
          if [ -n "${{ github.event.inputs.pdf_url }}" ]; then
            echo "Using the PDF URL provided."
            python tools/iata_etl.py --pdf-url "${{ github.event.inputs.pdf_url }}"
          else
            echo "Auto-discovering the latest IATA report with headless Chromium..."
            if node tools/fetch_iata_pdf.js --out /tmp/iata.pdf; then
              python tools/iata_etl.py --pdf /tmp/iata.pdf
            else
              echo "::warning::IATA auto-fetch found no downloadable report (site layout/access may have changed)."
            fi
          fi

      - name: Commit if data changed
        if: ${{ github.event.inputs.mode != 'diagnose' }}
        run: |
          if git diff --quiet -- data/data.json; then
            echo "data/data.json unchanged — nothing to commit."
          else
            git config user.name "iata-data-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/data.json
            git commit -m "Auto-update IATA regional data ($(date -u +%Y-%m-%d))"
            git push
            echo "Committed updated data/data.json."
          fi
