name: Update IATA data

# Keeps data/data.json up to date with IATA's monthly "Air Passenger Market
# Analysis". Runs on a schedule (IATA publishes ~4 weeks after month-end) and
# can also be run on demand. When data/data.json changes it commits to the
# branch, which Cloudflare Pages then redeploys automatically.

on:
  schedule:
    # 06:00 UTC on the 5th, 12th, 19th and 26th — catches the report whenever
    # IATA publishes it that month. Re-runs are idempotent (no-op if unchanged).
    - cron: "0 6 5,12,19,26 * *"
  workflow_dispatch:
    inputs:
      pdf_url:
        description: "Optional: direct URL to an IATA Air Passenger PDF (skips auto-discovery)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: update-iata-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet "pdfminer.six>=20221105"

      - name: Fetch & update IATA data
        run: |
          set -o pipefail
          if [ -n "${{ github.event.inputs.pdf_url }}" ]; then
            echo "Using provided PDF URL."
            python tools/iata_etl.py --pdf-url "${{ github.event.inputs.pdf_url }}"
          else
            echo "Auto-discovering the latest IATA report..."
            # A missed/blocked fetch must not fail the scheduled run.
            python tools/iata_etl.py --fetch || echo "::warning::IATA auto-fetch produced no update (site unreachable, blocked, or no new report)."
          fi

      - name: Commit if data changed
        run: |
          if git diff --quiet -- data/data.json; then
            echo "data/data.json unchanged — nothing to commit."
          else
            git config user.name "iata-data-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/data.json
            git commit -m "Auto-update IATA regional data ($(date -u +%Y-%m-%d))"
            git push
            echo "Committed updated data/data.json."
          fi
