name: Update TSA data

# Keeps data/tsa.json current from TSA.gov's daily passenger-volume table.
# TSA publishes new figures most days, so this runs daily; commits only on
# change, after which Cloudflare Pages redeploys.

on:
  schedule:
    - cron: "0 13 * * *"      # 13:00 UTC daily
  workflow_dispatch:
    inputs:
      diagnose:
        description: "Set to 'yes' to print the page structure without writing"
        required: false
        default: ""
      backfill:
        description: "Optional: space-separated YYYYMMDD archive dates to seed history"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: update-tsa-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Diagnose TSA page and stop
        if: ${{ github.event.inputs.diagnose != '' }}
        run: python tools/tsa_etl.py --diagnose

      - name: Back-fill TSA history from the Internet Archive
        if: ${{ github.event.inputs.diagnose == '' && github.event.inputs.backfill != '' }}
        run: python tools/tsa_etl.py --backfill "${{ github.event.inputs.backfill }}"

      - name: Fetch & update TSA data
        if: ${{ github.event.inputs.diagnose == '' && github.event.inputs.backfill == '' }}
        run: python tools/tsa_etl.py || echo "::warning::TSA update produced no change (page unreachable or layout changed)."

      - name: Commit if data changed
        if: ${{ github.event.inputs.diagnose == '' }}
        run: |
          if git diff --quiet -- data/tsa.json; then
            echo "data/tsa.json unchanged — nothing to commit."
          else
            git config user.name "tsa-data-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/tsa.json
            git commit -m "Auto-update TSA data ($(date -u +%Y-%m-%d))"
            git push
            echo "Committed updated data/tsa.json."
          fi
